name: WASM Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0-wasm)"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  WASM_OUTPUT: docs/scheduled-db.wasm

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build WASM module
        run: |
          mkdir -p docs
          GOOS=js GOARCH=wasm go build -o ${{ env.WASM_OUTPUT }} ./cmd/wasm/

      - name: Copy wasm_exec.js
        run: |
          GOROOT=$(go env GOROOT)
          WASM_JS="$GOROOT/lib/wasm/wasm_exec.js"
          if [ ! -f "$WASM_JS" ]; then
            WASM_JS="$GOROOT/misc/wasm/wasm_exec.js"
          fi
          cp "$WASM_JS" docs/wasm_exec.js

      - name: Verify build
        run: |
          ls -lh docs/scheduled-db.wasm docs/wasm_exec.js
          file docs/scheduled-db.wasm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-db-wasm
          path: |
            docs/scheduled-db.wasm
            docs/wasm_exec.js
          retention-days: 30

  release:
    needs: build-wasm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: scheduled-db-wasm
          path: release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "WASM ${{ steps.tag.outputs.version }}"
          body: |
            ## scheduled-db WASM Simulator

            Browser-compatible WebAssembly build of the scheduled-db scheduling engine.

            ### Files
            - `scheduled-db.wasm` — WASM module (Go scheduler engine)
            - `wasm_exec.js` — Go WASM runtime (must match Go version used to build)

            ### Usage
            ```html
            <script src="wasm_exec.js"></script>
            <script>
              const go = new Go();
              WebAssembly.instantiateStreaming(fetch("scheduled-db.wasm"), go.importObject)
                .then(result => {
                  go.run(result.instance);
                  // simulator.* API available
                  simulator.createJob('{"type":"unico","timestamp":"2026-01-01T00:00:00Z"}');
                  simulator.tick();
                  console.log(simulator.getStateJSON());
                });
            </script>
            ```
          files: |
            release/scheduled-db.wasm
            release/wasm_exec.js
          draft: false
          prerelease: false
